<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GTA: HTML City - Enhanced</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #1a1a1a;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      color: white;
    }

    #gameCanvas {
      display: block;
      background: #2d5016;
      image-rendering: pixelated;
    }

    #ui {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.8);
      padding: 15px;
      border: 2px solid #444;
      border-radius: 4px;
      pointer-events: none;
      z-index: 100;
    }

    .instruction {
      margin: 5px 0;
      font-size: 14px;
      color: #aaa;
    }

    .key {
      color: #fff;
      background: #333;
      padding: 2px 6px;
      border-radius: 3px;
      font-weight: bold;
    }

    #carInfo {
      margin-top: 10px;
      color: #ffff00;
      display: none;
    }

    #zoomLevel {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.8);
      padding: 10px;
      border-radius: 4px;
      color: #aaa;
    }
  </style>
</head>

<body>
  <canvas id="gameCanvas"></canvas>

  <div id="ui">
    <div class="instruction"><span class="key">WASD</span> Move / Drive</div>
    <div class="instruction"><span class="key">SPACE</span> Enter/Exit Vehicle</div>
    <div class="instruction"><span class="key">SHIFT</span> Run</div>
    <div class="instruction"><span class="key">SCROLL</span> Zoom</div>
    <div class="instruction" id="carInfo">
      SPEED: <span id="speed">0</span> km/h
    </div>
  </div>

  <div id="zoomLevel">ZOOM: <span id="zoomValue">100%</span></div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const TILE_SIZE = 40;
    const WORLD_WIDTH = 40;
    const WORLD_HEIGHT = 40;
    const CAR_WIDTH = 24;
    const CAR_HEIGHT = 14;
    const PLAYER_SIZE = 12;

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const keys = {};
    window.addEventListener('keydown', (e) => {
      keys[e.code] = true;
      if (e.code === 'Space') {
        e.preventDefault();
        toggleVehicle();
      }
    });
    window.addEventListener('keyup', (e) => keys[e.code] = false);

    const camera = {
      x: 0,
      y: 0,
      zoom: 1.0,
      targetZoom: 1.0,
      minZoom: 0.4,
      maxZoom: 2.0,
      follow: null,
      zoomingToCar: false
    };

    window.addEventListener('wheel', (e) => {
      e.preventDefault();
      if (camera.zoomingToCar) return; // Disable manual zoom during transition

      const zoomSpeed = 0.1;
      if (e.deltaY < 0) {
        camera.targetZoom = Math.min(camera.maxZoom, camera.targetZoom + zoomSpeed);
      } else {
        camera.targetZoom = Math.max(camera.minZoom, camera.targetZoom - zoomSpeed);
      }
    }, { passive: false });

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    let player;
    let cars = [];
    let particles = [];
    let buildings = [];
    let skidMarks = [];
    let streetlamps = [];

    function rectIntersect(r1, r2) {
      return !(r2.x > r1.x + r1.width ||
        r2.x + r2.width < r1.x ||
        r2.y > r1.y + r1.height ||
        r2.y + r2.height < r1.y);
    }

    function getDistance(x1, y1, x2, y2) {
      return Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
    }

    class Particle {
      constructor(x, y, vx, vy, color, life, type = 'normal') {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.color = color;
        this.life = life;
        this.maxLife = life;
        this.type = type;
        this.size = type === 'steam' ? 8 + Math.random() * 8 : 4;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life--;

        if (this.type === 'steam') {
          this.vx *= 0.98;
          this.vy *= 0.98;
          this.size += 0.2;
        } else {
          this.vx *= 0.95;
          this.vy *= 0.95;
        }
      }

      draw(ctx) {
        ctx.globalAlpha = this.life / this.maxLife;
        if (this.type === 'steam') {
          ctx.fillStyle = `rgba(255, 255, 255, ${0.3 * (this.life / this.maxLife)})`;
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fill();
        } else {
          ctx.fillStyle = this.color;
          ctx.fillRect(this.x - 2, this.y - 2, 4, 4);
        }
        ctx.globalAlpha = 1;
      }
    }

    class SkidMark {
      constructor(x, y, angle) {
        this.x = x;
        this.y = y;
        this.angle = angle;
        this.opacity = 0.6;
        this.life = 300; // Frames until fade
      }

      update() {
        this.life--;
        this.opacity = (this.life / 300) * 0.6;
      }

      draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);
        ctx.globalAlpha = this.opacity;
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(-8, -2, 16, 4);
        ctx.restore();
      }
    }

    class StreetLamp {
      constructor(x, y, angle) {
        this.x = x;
        this.y = y;
        this.angle = angle; // 0 = right, PI/2 = down, etc
        this.height = 30;
        this.isBlinking = Math.random() < 0.3; // 30% chance to malfunction
        this.blinkTimer = 0;
        this.blinkState = true;
        this.lightRadius = 80;
      }

      update() {
        if (this.isBlinking) {
          this.blinkTimer++;
          if (this.blinkTimer > 10 + Math.random() * 20) {
            this.blinkState = !this.blinkState;
            this.blinkTimer = 0;
          }
        }
      }

      draw(ctx) {
        // Lamp post
        ctx.strokeStyle = '#444';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(this.x, this.y);
        ctx.lineTo(this.x + Math.cos(this.angle) * 15, this.y + Math.sin(this.angle) * 15);
        ctx.lineTo(this.x + Math.cos(this.angle) * 15, this.y + Math.sin(this.angle) * 15 - this.height);
        ctx.stroke();

        // Lamp head
        ctx.fillStyle = this.blinkState ? '#ffffaa' : '#333';
        ctx.beginPath();
        ctx.arc(this.x + Math.cos(this.angle) * 15, this.y + Math.sin(this.angle) * 15 - this.height, 4, 0, Math.PI * 2);
        ctx.fill();

        // Light cone
        if (this.blinkState) {
          ctx.save();
          ctx.translate(this.x + Math.cos(this.angle) * 15, this.y + Math.sin(this.angle) * 15 - this.height);
          ctx.rotate(this.angle + Math.PI / 2);

          const gradient = ctx.createRadialGradient(0, 0, 5, 0, 40, this.lightRadius);
          gradient.addColorStop(0, 'rgba(255, 255, 200, 0.4)');
          gradient.addColorStop(1, 'rgba(255, 255, 200, 0)');

          ctx.fillStyle = gradient;
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.arc(0, 0, this.lightRadius, -0.3, 0.3);
          ctx.closePath();
          ctx.fill();
          ctx.restore();
        }
      }
    }

    function createParticles(x, y, count, color, type = 'normal') {
      for (let i = 0; i < count; i++) {
        const angle = (Math.PI * 2 * i) / count;
        const speed = 2 + Math.random() * 3;
        particles.push(new Particle(
          x, y,
          Math.cos(angle) * speed,
          Math.sin(angle) * speed,
          color,
          20 + Math.random() * 10,
          type
        ));
      }
    }

    class Building {
      constructor(x, y, width, height, color) {
        this.x = x;
        this.y = y;
        this.width = width;
        this.height = height;
        this.color = color;
        this.roofColor = this.adjustColor(color, -30);

        this.acUnits = [];
        this.chimneys = [];

        const acCount = 1 + Math.floor(Math.random() * 3);
        for (let i = 0; i < acCount; i++) {
          this.acUnits.push({
            x: 5 + Math.random() * (width - 25),
            y: 5 + Math.random() * (height - 15),
            width: 16,
            height: 10,
            fanAngle: Math.random() * Math.PI * 2
          });
        }

        const chimneyCount = 1 + Math.floor(Math.random() * 2);
        for (let i = 0; i < chimneyCount; i++) {
          this.chimneys.push({
            x: 10 + Math.random() * (width - 20),
            y: 5 + Math.random() * 10,
            width: 8,
            height: 12,
            emitTimer: Math.random() * 60
          });
        }
      }

      adjustColor(hex, amount) {
        const num = parseInt(hex.replace('#', ''), 16);
        const r = Math.max(0, Math.min(255, (num >> 16) + amount));
        const g = Math.max(0, Math.min(255, ((num >> 8) & 0x00FF) + amount));
        const b = Math.max(0, Math.min(255, (num & 0x0000FF) + amount));
        return `#${((r << 16) | (g << 8) | b).toString(16).padStart(6, '0')}`;
      }

      update() {
        for (let ac of this.acUnits) {
          ac.fanAngle += 0.2;
        }

        for (let chim of this.chimneys) {
          chim.emitTimer--;
          if (chim.emitTimer <= 0) {
            particles.push(new Particle(
              this.x + chim.x + chim.width / 2,
              this.y + chim.y,
              (Math.random() - 0.5) * 0.5,
              -1 - Math.random(),
              'rgba(255,255,255,0.5)',
              60 + Math.random() * 30,
              'steam'
            ));
            chim.emitTimer = 20 + Math.random() * 40;
          }
        }
      }

      draw(ctx) {
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.fillRect(this.x + 5, this.y + 5, this.width, this.height);

        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, this.width, this.height);

        ctx.fillStyle = this.roofColor;
        ctx.fillRect(this.x, this.y, this.width, 6);

        for (let ac of this.acUnits) {
          ctx.fillStyle = '#555';
          ctx.fillRect(this.x + ac.x, this.y + ac.y, ac.width, ac.height);

          ctx.fillStyle = '#333';
          ctx.fillRect(this.x + ac.x + 2, this.y + ac.y + 2, ac.width - 4, ac.height - 4);

          ctx.strokeStyle = '#777';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.arc(this.x + ac.x + ac.width / 2, this.y + ac.y + ac.height / 2, 3, ac.fanAngle, ac.fanAngle + Math.PI);
          ctx.stroke();
        }

        for (let chim of this.chimneys) {
          ctx.fillStyle = '#444';
          ctx.fillRect(this.x + chim.x, this.y + chim.y - chim.height, chim.width, chim.height);
          ctx.fillStyle = '#333';
          ctx.fillRect(this.x + chim.x - 2, this.y + chim.y - chim.height, chim.width + 4, 4);
        }

        ctx.strokeStyle = '#1a1a1a';
        ctx.lineWidth = 2;
        ctx.strokeRect(this.x, this.y, this.width, this.height);
      }
    }

    class Car {
      constructor(x, y, angle, speed, color) {
        this.x = x;
        this.y = y;
        this.width = CAR_WIDTH;
        this.height = CAR_HEIGHT;
        this.angle = angle;
        this.baseSpeed = speed;
        this.speed = speed;
        this.color = color;
        this.driver = null;
        this.acceleration = 0.2;
        this.friction = 0.96;
        this.turnSpeed = 0.05;
        this.velX = Math.cos(angle) * speed;
        this.velY = Math.sin(angle) * speed;
        this.prevAngle = angle;
        this.skidTimer = 0;
      }

      getBounds() {
        return {
          x: this.x - this.width / 2,
          y: this.y - this.height / 2,
          width: this.width,
          height: this.height
        };
      }

      resolveBuildingCollision(building) {
        const carBounds = this.getBounds();

        const overlapX = Math.min(carBounds.x + carBounds.width, building.x + building.width) -
          Math.max(carBounds.x, building.x);
        const overlapY = Math.min(carBounds.y + carBounds.height, building.y + building.height) -
          Math.max(carBounds.y, building.y);

        if (overlapX < overlapY) {
          if (carBounds.x + carBounds.width / 2 < building.x + building.width / 2) {
            this.x -= overlapX + 1;
          } else {
            this.x += overlapX + 1;
          }
          this.velX *= -0.5;
        } else {
          if (carBounds.y + carBounds.height / 2 < building.y + building.height / 2) {
            this.y -= overlapY + 1;
          } else {
            this.y += overlapY + 1;
          }
          this.velY *= -0.5;
        }

        if (!this.driver) {
          this.angle += Math.PI / 2;
        }
      }

      checkCollision(rect) {
        return rectIntersect(this.getBounds(), rect);
      }

      update() {
        this.prevAngle = this.angle;

        if (this.driver) {
          if (keys['KeyW'] || keys['ArrowUp']) {
            this.velX += Math.cos(this.angle) * this.acceleration;
            this.velY += Math.sin(this.angle) * this.acceleration;
          }
          if (keys['KeyS'] || keys['ArrowDown']) {
            this.velX -= Math.cos(this.angle) * this.acceleration * 0.5;
            this.velY -= Math.sin(this.angle) * this.acceleration * 0.5;
          }
          if (keys['KeyA'] || keys['ArrowLeft']) {
            const turnFactor = Math.min(3, Math.sqrt(this.velX ** 2 + this.velY ** 2) * 0.5);
            this.angle -= this.turnSpeed * turnFactor;
          }
          if (keys['KeyD'] || keys['ArrowRight']) {
            const turnFactor = Math.min(3, Math.sqrt(this.velX ** 2 + this.velY ** 2) * 0.5);
            this.angle += this.turnSpeed * turnFactor;
          }

          this.velX *= this.friction;
          this.velY *= this.friction;

          // Check for heavy drifting
          const speed = Math.sqrt(this.velX ** 2 + this.velY ** 2);
          const turnAmount = Math.abs(this.angle - this.prevAngle);

          if (speed > 2 && turnAmount > 0.02) {
            this.skidTimer++;
            if (this.skidTimer > 3) { // Don't draw every frame
              // Add skid marks at rear wheels
              const rearX = this.x - Math.cos(this.angle) * 10;
              const rearY = this.y - Math.sin(this.angle) * 10;
              skidMarks.push(new SkidMark(rearX, rearY, this.angle));

              // Side skids for hard turns
              if (turnAmount > 0.05) {
                const sideOffset = Math.cos(this.angle + Math.PI / 2) * 8;
                const sideOffsetY = Math.sin(this.angle + Math.PI / 2) * 8;
                skidMarks.push(new SkidMark(rearX + sideOffset, rearY + sideOffsetY, this.angle));
                skidMarks.push(new SkidMark(rearX - sideOffset, rearY - sideOffsetY, this.angle));
              }

              this.skidTimer = 0;
            }
          }
        } else {
          this.velX = Math.cos(this.angle) * this.speed;
          this.velY = Math.sin(this.angle) * this.speed;

          if (this.x < 80 || this.x > WORLD_WIDTH * TILE_SIZE - 80 ||
            this.y < 80 || this.y > WORLD_HEIGHT * TILE_SIZE - 80) {
            this.angle += Math.PI;
            this.x += Math.cos(this.angle) * 5;
            this.y += Math.sin(this.angle) * 5;
          }
        }

        this.x += this.velX;
        this.y += this.velY;

        for (let building of buildings) {
          if (this.checkCollision(building)) {
            this.resolveBuildingCollision(building);
            if (this.driver) {
              createParticles(this.x, this.y, 3, '#ff6600');
            }
          }
        }
      }

      draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);

        ctx.fillStyle = this.color;
        ctx.fillRect(-this.width / 2, -this.height / 2, this.width, this.height);

        ctx.fillStyle = '#88ccff';
        ctx.fillRect(0, -this.height / 2 + 2, 8, this.height - 4);

        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.fillRect(-4, -this.height / 2 + 3, 10, this.height - 6);

        ctx.fillStyle = '#ffffaa';
        ctx.fillRect(this.width / 2 - 2, -this.height / 2 + 1, 3, 3);
        ctx.fillRect(this.width / 2 - 2, this.height / 2 - 4, 3, 3);

        ctx.fillStyle = '#ff0000';
        ctx.fillRect(-this.width / 2, -this.height / 2 + 1, 2, 3);
        ctx.fillRect(-this.width / 2, this.height / 2 - 4, 2, 3);

        ctx.restore();
      }
    }

    class Player {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.width = PLAYER_SIZE;
        this.height = PLAYER_SIZE;
        this.angle = 0;
        this.maxSpeed = 3;
        this.runSpeed = 5;
        this.vehicle = null;
        this.color = '#ff6600';
      }

      update() {
        if (this.vehicle) {
          this.x = this.vehicle.x;
          this.y = this.vehicle.y;
          this.angle = this.vehicle.angle;
          return;
        }

        let moveSpeed = keys['ShiftLeft'] ? this.runSpeed : this.maxSpeed;
        let dx = 0;
        let dy = 0;

        if (keys['KeyW'] || keys['ArrowUp']) dy = -moveSpeed;
        if (keys['KeyS'] || keys['ArrowDown']) dy = moveSpeed;
        if (keys['KeyA'] || keys['ArrowLeft']) dx = -moveSpeed;
        if (keys['KeyD'] || keys['ArrowRight']) dx = moveSpeed;

        if (dx !== 0 && dy !== 0) {
          dx *= 0.707;
          dy *= 0.707;
        }

        const newX = this.x + dx;
        const newY = this.y + dy;

        let canMoveX = true;
        let canMoveY = true;

        for (let building of buildings) {
          if (rectIntersect(
            { x: newX - this.width / 2, y: this.y - this.height / 2, width: this.width, height: this.height },
            building
          )) canMoveX = false;

          if (rectIntersect(
            { x: this.x - this.width / 2, y: newY - this.height / 2, width: this.width, height: this.height },
            building
          )) canMoveY = false;
        }

        if (canMoveX) this.x = newX;
        if (canMoveY) this.y = newY;

        if (dx !== 0 || dy !== 0) {
          this.angle = Math.atan2(dy, dx);
        }

        this.x = Math.max(this.width / 2, Math.min(WORLD_WIDTH * TILE_SIZE - this.width / 2, this.x));
        this.y = Math.max(this.height / 2, Math.min(WORLD_HEIGHT * TILE_SIZE - this.height / 2, this.y));
      }

      draw(ctx) {
        if (this.vehicle) return;

        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);

        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(0, 0, 6, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#ffff00';
        ctx.fillRect(2, -2, 4, 4);

        ctx.restore();
      }

      enterVehicle(car) {
        this.vehicle = car;
        car.driver = this;
        document.getElementById('carInfo').style.display = 'block';

        // Trigger zoom animation to 200%
        camera.targetZoom = 2.0;
        camera.zoomingToCar = true;

        // Reset after animation
        setTimeout(() => {
          camera.zoomingToCar = false;
        }, 1000);
      }

      exitVehicle() {
        if (!this.vehicle) return;

        const exitDist = 25;
        this.x = this.vehicle.x - Math.cos(this.vehicle.angle) * exitDist;
        this.y = this.vehicle.y - Math.sin(this.vehicle.angle) * exitDist;

        this.vehicle.driver = null;
        this.vehicle = null;

        document.getElementById('carInfo').style.display = 'none';

        // Zoom back to normal
        camera.targetZoom = 1.0;
      }
    }

    function generateWorld() {
      // Generate buildings
      for (let x = 3; x < WORLD_WIDTH - 2; x += 5) {
        for (let y = 3; y < WORLD_HEIGHT - 2; y += 5) {
          const width = 3 * TILE_SIZE;
          const height = 3 * TILE_SIZE;
          const px = x * TILE_SIZE;
          const py = y * TILE_SIZE;

          const colors = ['#8B4513', '#696969', '#A0522D', '#708090', '#556B2F', '#4a4a4a'];
          const color = colors[Math.floor(Math.random() * colors.length)];

          buildings.push(new Building(px, py, width, height, color));
        }
      }

      // Generate streetlamps at intersections and along roads
      const roadPositions = [1, 2, 6, 7, 11, 12, 16, 17, 21, 22, 26, 27, 31, 32, 36, 37];

      // Place lamps at intersections
      for (let i = 0; i < roadPositions.length; i += 2) {
        for (let j = 0; j < roadPositions.length; j += 2) {
          const x = roadPositions[i] * TILE_SIZE + TILE_SIZE;
          const y = roadPositions[j] * TILE_SIZE + TILE_SIZE;

          // Offset slightly from center of intersection
          streetlamps.push(new StreetLamp(x + 10, y + 10, -Math.PI / 2)); // Point down
        }
      }

      // Add some along straight roads
      for (let i = 0; i < 20; i++) {
        const isHorizontal = Math.random() > 0.5;
        const roadTiles = [1, 2, 6, 7, 11, 12, 16, 17, 21, 22, 26, 27, 31, 32, 36, 37];

        if (isHorizontal) {
          const x = Math.random() * WORLD_WIDTH * TILE_SIZE;
          const y = roadTiles[Math.floor(Math.random() * roadTiles.length)] * TILE_SIZE + TILE_SIZE / 2;
          streetlamps.push(new StreetLamp(x, y + 15, -Math.PI / 2));
        } else {
          const x = roadTiles[Math.floor(Math.random() * roadTiles.length)] * TILE_SIZE + TILE_SIZE / 2;
          const y = Math.random() * WORLD_HEIGHT * TILE_SIZE;
          streetlamps.push(new StreetLamp(x + 15, y, 0));
        }
      }
    }

    function spawnTraffic() {
      const roadTiles = [1, 2, 6, 7, 11, 12, 16, 17, 21, 22, 26, 27, 31, 32, 36, 37];
      const isHorizontal = Math.random() > 0.5;

      let x, y, angle;

      if (isHorizontal) {
        const tileY = roadTiles[Math.floor(Math.random() * roadTiles.length)];
        y = tileY * TILE_SIZE + TILE_SIZE / 2;
        x = Math.random() * (WORLD_WIDTH * TILE_SIZE - 200) + 100;
        angle = Math.random() > 0.5 ? 0 : Math.PI;
      } else {
        const tileX = roadTiles[Math.floor(Math.random() * roadTiles.length)];
        x = tileX * TILE_SIZE + TILE_SIZE / 2;
        y = Math.random() * (WORLD_HEIGHT * TILE_SIZE - 200) + 100;
        angle = Math.random() > 0.5 ? Math.PI / 2 : -Math.PI / 2;
      }

      // Check for overlap with existing cars
      let overlap = false;
      for (let car of cars) {
        if (getDistance(x, y, car.x, car.y) < 50) {
          overlap = true;
          break;
        }
      }

      // Also check distance from player
      if (player && getDistance(x, y, player.x, player.y) < 100) {
        overlap = true;
      }

      if (overlap) return; // Don't spawn if overlapping

      const colors = ['#cc0000', '#0000cc', '#cccccc', '#444444', '#dddddd', '#ff6600', '#2d5016'];
      const color = colors[Math.floor(Math.random() * colors.length)];
      const speed = 2 + Math.random() * 2;

      cars.push(new Car(x, y, angle, speed, color));
    }

    function checkCarCollisions() {
      for (let i = 0; i < cars.length; i++) {
        for (let j = i + 1; j < cars.length; j++) {
          const car1 = cars[i];
          const car2 = cars[j];

          const dist = getDistance(car1.x, car1.y, car2.x, car2.y);

          if (dist < 20) {
            const angle = Math.atan2(car2.y - car1.y, car2.x - car1.x);
            const force = 4;

            if (!car1.driver) {
              car1.velX = -Math.cos(angle) * force;
              car1.velY = -Math.sin(angle) * force;
              car1.angle = Math.atan2(car1.velY, car1.velX);
              car1.x += car1.velX;
              car1.y += car1.velY;
            }

            if (!car2.driver) {
              car2.velX = Math.cos(angle) * force;
              car2.velY = Math.sin(angle) * force;
              car2.angle = Math.atan2(car2.velY, car2.velX);
              car2.x += car2.velX;
              car2.y += car2.velY;
            }

            if (Math.abs(car1.velX) + Math.abs(car1.velY) > 2 ||
              Math.abs(car2.velX) + Math.abs(car2.velY) > 2) {
              createParticles((car1.x + car2.x) / 2, (car1.y + car2.y) / 2, 5, '#ffaa00');
            }
          }
        }
      }
    }

    function toggleVehicle() {
      if (player.vehicle) {
        player.exitVehicle();
      } else {
        let nearest = null;
        let nearestDist = 40;

        for (let car of cars) {
          const dist = getDistance(player.x, player.y, car.x, car.y);
          if (dist < nearestDist && !car.driver) {
            nearest = car;
            nearestDist = dist;
          }
        }

        if (nearest) {
          player.enterVehicle(nearest);
          createParticles(player.x, player.y, 8, '#ffff00');
        }
      }
    }

    function updateCamera() {
      if (camera.follow) {
        camera.x = camera.follow.x;
        camera.y = camera.follow.y;
      }

      // Smooth zoom transition with easing
      const diff = camera.targetZoom - camera.zoom;
      if (Math.abs(diff) > 0.001) {
        // Ease in-out cubic
        const easing = diff > 0 ? 0.05 : 0.1;
        camera.zoom += diff * easing;
        document.getElementById('zoomValue').textContent = Math.round(camera.zoom * 100) + '%';
      }
    }

    function update() {
      player.update();

      for (let car of cars) {
        car.update();
      }

      for (let building of buildings) {
        building.update();
      }

      for (let lamp of streetlamps) {
        lamp.update();
      }

      // Update skid marks
      for (let i = skidMarks.length - 1; i >= 0; i--) {
        skidMarks[i].update();
        if (skidMarks[i].life <= 0) {
          skidMarks.splice(i, 1);
        }
      }

      checkCarCollisions();

      if (cars.length < 20 && Math.random() < 0.02) {
        spawnTraffic();
      }

      for (let i = cars.length - 1; i >= 0; i--) {
        const dist = getDistance(
          cars[i].x, cars[i].y,
          camera.x, camera.y
        );
        if (dist > 1500 && !cars[i].driver) {
          cars.splice(i, 1);
        }
      }

      for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        if (particles[i].life <= 0) particles.splice(i, 1);
      }

      if (player.vehicle) {
        const speed = Math.sqrt(player.vehicle.velX ** 2 + player.vehicle.velY ** 2) * 10;
        document.getElementById('speed').textContent = Math.floor(speed);
      }

      updateCamera();
    }

    function draw() {
      ctx.fillStyle = '#2d5016';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.save();

      // Apply camera transform with zoom centered on screen
      ctx.translate(canvas.width / 2, canvas.height / 2);
      ctx.scale(camera.zoom, camera.zoom);
      ctx.translate(-camera.x, -camera.y);

      // Draw wider roads (2 tiles) - positions 1,2 mod 5
      ctx.fillStyle = '#333333';
      for (let x = 0; x < WORLD_WIDTH; x++) {
        for (let y = 0; y < WORLD_HEIGHT; y++) {
          const isRoadX = (x % 5 === 1) || (x % 5 === 2);
          const isRoadY = (y % 5 === 1) || (y % 5 === 2);
          if (isRoadX || isRoadY) {
            ctx.fillRect(x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
          }
        }
      }

      // Draw skid marks (before buildings/cars so they appear on ground)
      for (let mark of skidMarks) {
        mark.draw(ctx);
      }

      // Road markings
      ctx.strokeStyle = '#ffffff';
      ctx.setLineDash([20, 20]);
      ctx.lineWidth = 2;
      for (let x = 1; x < WORLD_WIDTH; x += 5) {
        ctx.beginPath();
        ctx.moveTo(x * TILE_SIZE + TILE_SIZE, 0);
        ctx.lineTo(x * TILE_SIZE + TILE_SIZE, WORLD_HEIGHT * TILE_SIZE);
        ctx.stroke();
      }
      for (let y = 1; y < WORLD_HEIGHT; y += 5) {
        ctx.beginPath();
        ctx.moveTo(0, y * TILE_SIZE + TILE_SIZE);
        ctx.lineTo(WORLD_WIDTH * TILE_SIZE, y * TILE_SIZE + TILE_SIZE);
        ctx.stroke();
      }
      ctx.setLineDash([]);

      // Draw streetlamps (behind buildings but light above)
      for (let lamp of streetlamps) {
        lamp.draw(ctx);
      }

      // Draw buildings
      for (let building of buildings) {
        building.draw(ctx);
      }

      // Sort by Y for depth
      const renderList = [...cars, player].sort((a, b) => a.y - b.y);
      for (let obj of renderList) {
        if (obj === player && player.vehicle) continue;
        obj.draw(ctx);
      }

      // Draw particles (steam, smoke, etc)
      for (let particle of particles) {
        particle.draw(ctx);
      }

      ctx.restore();
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    function init() {
      generateWorld();
      player = new Player(100, 100);
      camera.follow = player;

      for (let i = 0; i < 15; i++) {
        spawnTraffic();
      }

      loop();
    }

    init();
  </script>
</body>
