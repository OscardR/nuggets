<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nuggets - HTML/JS Collection</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 2rem;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 3rem 2rem;
      text-align: center;
    }

    .header h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }

    .header p {
      font-size: 1.1rem;
      opacity: 0.9;
    }

    .content {
      padding: 2rem;
    }

    .readme-content {
      margin-bottom: 3rem;
      line-height: 1.8;
      color: #333;
    }

    .readme-content h1,
    .readme-content h2,
    .readme-content h3 {
      margin: 1.5rem 0 0.75rem 0;
      color: #667eea;
    }

    .readme-content h1 {
      font-size: 2rem;
      border-bottom: 2px solid #667eea;
      padding-bottom: 0.5rem;
    }

    .readme-content h2 {
      font-size: 1.5rem;
    }

    .readme-content h3 {
      font-size: 1.25rem;
    }

    .readme-content p {
      margin: 1rem 0;
    }

    .readme-content ul,
    .readme-content ol {
      margin: 1rem 0 1rem 2rem;
    }

    .readme-content li {
      margin: 0.5rem 0;
    }

    .readme-content code {
      background: #f5f5f5;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      color: #764ba2;
    }

    .readme-content pre {
      background: #f5f5f5;
      padding: 1rem;
      border-radius: 8px;
      overflow-x: auto;
      margin: 1rem 0;
    }

    .readme-content pre code {
      background: none;
      padding: 0;
      color: #333;
    }

    .links-section {
      background: #f9f9f9;
      padding: 2rem;
      border-top: 2px solid #e0e0e0;
    }

    .links-section h2 {
      margin-top: 0;
      color: #667eea;
      margin-bottom: 1.5rem;
      font-size: 1.5rem;
    }

    .links-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1rem;
    }

    .link-card {
      background: white;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      padding: 1.5rem;
      text-decoration: none;
      color: #333;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .link-card:hover {
      border-color: #667eea;
      box-shadow: 0 8px 24px rgba(102, 126, 234, 0.2);
      transform: translateY(-4px);
    }

    .link-card-icon {
      font-size: 2.5rem;
      margin-bottom: 0.75rem;
    }

    .link-card-title {
      font-weight: 600;
      font-size: 1.1rem;
      margin-bottom: 0.5rem;
      color: #667eea;
    }

    .link-card-desc {
      font-size: 0.9rem;
      color: #666;
    }

    @media (max-width: 600px) {
      .header {
        padding: 2rem 1.5rem;
      }

      .header h1 {
        font-size: 1.75rem;
      }

      .content {
        padding: 1.5rem;
      }

      .links-section {
        padding: 1.5rem;
      }

      .links-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>🎁 Nuggets</h1>
      <p>Hosting HTML/JS Nuggets</p>
    </div>

    <div class="content">
      <div class="readme-content" id="readmeContent">
        <p>Loading...</p>
      </div>

      <div class="links-section">
        <h2>📚 Available Nuggets</h2>
        <div class="links-grid" id="linksGrid">
          <a href="mullers-factory.html" class="link-card">
            <div class="link-card-icon">🥞</div>
            <div class="link-card-title">Muller's Factory</div>
            <div class="link-card-desc">Crêpe Finder</div>
          </a>

          <a href="ai-models.html" class="link-card">
            <div class="link-card-icon">🤖</div>
            <div class="link-card-title">AI Models Explorer</div>
            <div class="link-card-desc">2026 Database</div>
          </a>
        </div>
      </div>
    </div>
  </div>

  <script>
    /**
     * Fetch and render the README.md content dynamically
     */
    async function loadReadme() {
      try {
        const response = await fetch('README.md');
        const markdown = await response.text();
        const html = marked.parse(markdown);
        document.getElementById('readmeContent').innerHTML = html;
      } catch (error) {
        console.error('Error loading README:', error);
        document.getElementById('readmeContent').innerHTML =
          '<p style="color: #d32f2f;">Unable to load README.md</p>';
      }
    }

    // Load README on page load
    document.addEventListener('DOMContentLoaded', loadReadme);
  </script>
</body>

</html>
