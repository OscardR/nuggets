<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Greekalizer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #111827;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header { padding: 1.5rem 2rem; text-align: center; }
    header h1 { font-size: 1.875rem; font-weight: 700; letter-spacing: 0.05em; }
    main {
      flex: 1;
      display: flex;
      gap: 2rem;
      padding: 0 2rem 2rem;
      position: relative;
    }
    textarea {
      flex: 1;
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 0.75rem;
      padding: 1.5rem;
      color: #fff;
      font-size: 1.25rem;
      line-height: 1.75;
      resize: none;
      outline: none;
    }
    textarea:focus { ring: 2px solid #3b82f6; }
    textarea::placeholder { color: #6b7280; }
    .btn-container {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
    }
    .greek-btn {
      width: 7rem;
      height: 7rem;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      font-weight: 700;
      font-size: 0.875rem;
      line-height: 1.3;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      transition: transform 0.2s, box-shadow 0.2s;
      background: repeating-linear-gradient(
        0deg,
        #0D5FC3 0px,
        #0D5FC3 22px,
        white 22px,
        white 44px,
        #0D5FC3 44px,
        #0D5FC3 66px,
        white 66px,
        white 88px,
        #0D5FC3 88px,
        #0D5FC3 110px
      );
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    .greek-btn:hover:not(:disabled) { transform: scale(1.1); }
    .greek-btn:active:not(:disabled) { transform: scale(0.95); }
    .greek-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .greek-btn span { color: #1e40af; }
    .spinner {
      width: 2rem;
      height: 2rem;
      border: 3px solid #1e40af;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    footer {
      padding: 1rem 2rem;
      text-align: center;
      color: #9ca3af;
      font-size: 0.875rem;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.5rem;
    }
    footer a { color: #60a5fa; text-decoration: none; }
    footer a:hover { text-decoration: underline; }
    .heart { color: #ef4444; }
  </style>
</head>
<body>
  <header>
    <h1>Greekalizer</h1>
  </header>

  <main>
    <textarea id="input" placeholder="Enter Spanish text here..."></textarea>
    
    <div class="btn-container">
      <button id="convertBtn" class="greek-btn" onclick="greekalize()">
        <span>Greek<br>alize!</span>
      </button>
    </div>
    
    <textarea id="output" readonly placeholder="Greek transcription will appear here..."></textarea>
  </main>

  <footer>
    <span>Vibe-coded with</span>
    <span class="heart">♥</span>
    <span>by</span>
    <a href="https://github.com/oscarDR" target="_blank">Oscar.dR</a>
    <span>|</span>
    <a href="https://github.com/oscarDR/greekalizer" target="_blank">GitHub</a>
  </footer>

  <script>
    const phoneticMap = [
      ["qü", "κου"], ["gü", "γου"], ["qu", "κ"], ["gu", "γ"],
      ["ch", "τσ"], ["ll", "δζ"],
      ["ca", "κα"], ["cá", "κά"], ["ce", "θε"], ["cé", "θέ"],
      ["ci", "θι"], ["cí", "θί"], ["co", "κο"], ["có", "κό"],
      ["cu", "κου"], ["cú", "κού"],
      ["ge", "χε"], ["gi", "χι"],
      ["rr", "ρρ"],
      ["Qü", "Κου"], ["Gü", "Γου"], ["Qu", "Κ"], ["Gu", "Γ"],
      ["Ch", "Τσ"], ["Ll", "Δζ"],
      ["Ca", "Κα"], ["Cá", "Κά"], ["Ce", "Θε"], ["Cé", "Θέ"],
      ["Ci", "Θι"], ["Cí", "Θί"], ["Co", "Κο"], ["Có", "Κό"],
      ["Cu", "Κου"], ["Cú", "Κού"], ["Ge", "Χε"], ["Gi", "Χι"],
      ["a", "α"], ["á", "ά"], ["b", "μβ"], ["d", "δ"],
      ["e", "ε"], ["é", "έ"], ["f", "φ"], ["g", "γ"],
      ["h", "'"], ["i", "η"], ["í", "ή"], ["j", "χ"],
      ["k", "κ"], ["l", "λ"], ["m", "μ"], ["n", "ν"],
      ["ñ", "νι"], ["o", "ο"], ["ó", "ό"], ["p", "π"],
      ["r", "ρ"], ["s", "σ"], ["t", "τ"],
      ["u", "ου"], ["ú", "ού"],
      ["v", "β"], ["w", "βου"], ["x", "ξ"], ["y", "γι"], ["z", "θ"],
      ["A", "Α"], ["Á", "Ά"], ["B", "Μβ"], ["D", "Δ"],
      ["E", "Ε"], ["É", "Έ"], ["F", "Φ"], ["G", "Γ"],
      ["H", "'"], ["I", "Η"], ["Í", "Ή"], ["J", "Χ"],
      ["K", "Κ"], ["L", "Λ"], ["M", "Μ"], ["N", "Ν"],
      ["Ñ", "Νι"], ["O", "Ο"], ["Ó", "Ό"], ["P", "Π"],
      ["R", "Ρ"], ["S", "Σ"], ["T", "Τ"],
      ["U", "Ου"], ["Ú", "Ού"],
      ["V", "Β"], ["W", "Βου"], ["X", "Ξ"], ["Y", "Γι"], ["Z", "Θ"]
    ];

    function greekalize() {
      const input = document.getElementById('input');
      const output = document.getElementById('output');
      const btn = document.getElementById('convertBtn');
      
      const text = input.value.trim();
      if (!text) return;

      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div>';

      setTimeout(() => {
        let result = text;
        for (const [latin, greek] of phoneticMap) {
          result = result.split(latin).join(greek);
        }
        result = result.replace(/σ\b/g, 'ς');
        result = result.replace(/ο\b/g, 'ω');
        result = result.replace(/ό\b/g, 'ώ');

        output.value = result;
        
        btn.disabled = false;
        btn.innerHTML = '<span>Greek<br>alize!</span>';
      }, 50);
    }

    document.getElementById('input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
        greekalize();
      }
    });
  </script>
</body>
</html>
